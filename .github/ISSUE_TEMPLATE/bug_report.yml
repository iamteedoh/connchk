name: Bug report
description: Report a reproducible connchk problem
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not paste tokens, passwords,
        SSH keys, or private host details.

  - type: input
    id: version
    attributes:
      label: connchk version
      description: Provide a release tag or commit SHA.
      placeholder: v0.1.0 or 0123456
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - connchk.py (local or remote runner)
        - chkports.py (port checker)
        - CI or release automation
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: run-mode
    attributes:
      label: Run mode
      options:
        - Local run
        - Remote run over SSH
        - Not mode-specific
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant OS, Python, paramiko, and colorama versions. Redact private details.
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Observe ...
        3. Expected ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant redacted output
      description: Remove secrets and private infrastructure details before pasting.
      render: shell
